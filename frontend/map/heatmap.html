<!DOCTYPE html>
<html>
<head>
    <title>FIR Heatmap</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0">
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
        }
    </style>

    <script src="../assets/config.js"></script>
    <script>
        (function() {
            var s = document.createElement('script');
            s.src = 'https://maps.googleapis.com/maps/api/js?key=' + CONFIG.MAPS_KEY + '&libraries=visualization&callback=initMap';
            s.async = true; s.defer = true;
            document.head.appendChild(s);
        })();
    </script>
</head>

<body>
<div id="map"></div>

<script>
const API_URL = "http://127.0.0.1:8000/api/fir-data";

async function initMap() {
    const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 18.5204, lng: 73.8567 },
        zoom: 11,
    });

    let firData = [];
    try {
        const resp = await fetch(API_URL);
        firData = await resp.json();
    } catch (e) {
        console.error("Failed loading FIR data:", e);
        return;
    }

    // Group by exact coordinates; weight = number of FIRs at that point
    const groups = {};
    firData.forEach(r => {
        if (!r.latitude || !r.longitude) return;
        const k = `${r.latitude}_${r.longitude}`;
        if (!groups[k]) groups[k] = { lat: parseFloat(r.latitude), lng: parseFloat(r.longitude), count: 0 };
        groups[k].count++;
    });

    const heatPoints = Object.values(groups).map(g => ({
        location: new google.maps.LatLng(g.lat, g.lng),
        weight: g.count,
    }));

    new google.maps.visualization.HeatmapLayer({
        data: heatPoints,
        map: map,
        radius: 25,
    });

    console.log(`Heatmap loaded with ${heatPoints.length} unique locations.`);
}
</script>
</body>
</html>
