<!DOCTYPE html>
<html>

<head>
    <title>FIR Crime Map</title>
    <meta name="viewport" content="initial-scale=1.0">
    <meta charset="utf-8">
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
        }
        .popup-box {
            width: 220px;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            font-size: 14px;
            line-height: 1.4;
            color: #222;
        }
        .popup-title { font-weight: bold; margin-bottom: 6px; color: #111; }
    </style>

    <script src="../assets/config.js"></script>
    <script>
        (function() {
            var s = document.createElement('script');
            s.src = 'https://maps.googleapis.com/maps/api/js?key=' + CONFIG.MAPS_KEY + '&callback=initMap';
            s.async = true; s.defer = true;
            document.head.appendChild(s);
        })();
    </script>
</head>

<body>
    <div id="map"></div>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/fir-data";

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function initMap() {
            const map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 18.5204, lng: 73.8567 },
                zoom: 11,
            });

            const infoWindow = new google.maps.InfoWindow();

            let firData = [];
            try {
                const response = await fetch(API_URL);
                firData = await response.json();
            } catch (error) {
                console.error("Failed to fetch data:", error);
                return;
            }

            // Group by coordinates
            const locationGroups = {};
            firData.forEach(row => {
                if (!row.latitude || !row.longitude) return;
                const key = `${row.latitude}_${row.longitude}`;
                if (!locationGroups[key]) locationGroups[key] = [];
                locationGroups[key].push(row);
            });

            for (const key in locationGroups) {
                const group = locationGroups[key];
                const count = group.length;

                for (let i = 0; i < count; i++) {
                    const row = group[i];

                    const finalLat = parseFloat(row.latitude);
                    const finalLng = parseFloat(row.longitude);

                    const crime = row.crime_categories?.join(", ") || "Unknown Crime";
                    const summary = row.incident_summary || "No summary available";

                    const popupHTML = `
                        <div class="popup-box">
                            <div class="popup-title">Crime:</div> ${crime}<br><br>
                            <div class="popup-title">Summary:</div> ${summary}
                        </div>
                    `;

                    const marker = new google.maps.Marker({
                        position: { lat: finalLat, lng: finalLng },
                        map: map,
                    });

                    marker.addListener("click", () => {
                        infoWindow.setContent(popupHTML);
                        infoWindow.open(map, marker);
                    });

                    await sleep(50);
                }
            }

            console.log("Markers loaded with random jitter.");
        }
    </script>
</body>
</html>
