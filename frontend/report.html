<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUARDIAN — Report Crime</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <img src="assets/logo.jpeg" alt="Guardian">
        <span>GUARDIAN</span>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <a class="nav-item active" href="report.html">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Report Crime
        </a>
        <a class="nav-item" href="map/index.html" target="_blank">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
            Incident Map
        </a>
        <a class="nav-item" href="map/heatmap.html" target="_blank">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
            Heat map
        </a>
    </nav>
</aside>

<!-- ── Main ── -->
<main class="main">
    <div class="topbar">
        <div class="topbar-title">
            <h1>Report Crime</h1>
            <p>Submit a new incident report. It will be stored in the system immediately.</p>
        </div>
        <div id="user-pill-container"></div>
    </div>

    <div class="report-page">
        <div class="form-card">
            <div id="success-msg" class="alert"></div>
            <div id="error-msg" class="alert"></div>

            <form id="report-form" onsubmit="submitReport(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Complainant Name</label>
                        <input type="text" name="complainant_name" required placeholder="Full name">
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="text" name="complainant_contact" required placeholder="+91-XXXXXXXXXX">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Crime Type</label>
                        <select name="crime_type" required>
                            <option value="" disabled selected>Select type</option>
                            <option>Theft</option>
                            <option>Robbery</option>
                            <option>Assault</option>
                            <option>Murder</option>
                            <option>Rape</option>
                            <option>Fraud</option>
                            <option>Financial Scam</option>
                            <option>Cheating</option>
                            <option>Kidnapping</option>
                            <option>Gang-related</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date of Incident</label>
                        <input type="date" name="date_of_incident" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" required placeholder="Street address, area, city">
                </div>

                <div class="form-group">
                    <label>Incident Description</label>
                    <textarea name="incident_summary" required placeholder="Describe what happened in detail…"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Submit Report</button>
            </form>
        </div>
    </div>
</main>

<script src="assets/auth.js"></script>
<script>
const BACKEND = 'http://127.0.0.1:8000';

requireAuth();
renderUserPill('user-pill-container');

async function submitReport(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const successEl = document.getElementById('success-msg');
    const errorEl = document.getElementById('error-msg');
    successEl.className = 'alert';
    errorEl.className = 'alert';

    const form = e.target;
    const body = {
        complainant_name:    form.complainant_name.value,
        complainant_contact: form.complainant_contact.value,
        crime_type:          form.crime_type.value,
        date_of_incident:    form.date_of_incident.value,
        location:            form.location.value,
        incident_summary:    form.incident_summary.value,
    };

    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
        const res = await fetch(`${BACKEND}/api/report`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Submission failed');
        successEl.textContent = `Report submitted successfully. Reference ID: #${data.id}`;
        successEl.className = 'alert success';
        form.reset();
    } catch (err) {
        errorEl.textContent = err.message || 'Something went wrong. Please try again.';
        errorEl.className = 'alert error';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Report';
    }
}
</script>
</body>
</html>
